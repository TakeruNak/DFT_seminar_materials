##### ======================================================
#####  Prefix & Global Key Bindings
##### ======================================================

# Change tmux prefix from default C-b to C-z
set -g prefix C-z
unbind C-b

# Toggle pane zoom without prefix (C-z)
bind -n C-z resize-pane -Z

# Reload tmux config quickly
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Paste from tmux buffer
bind-key p paste-buffer


##### ======================================================
#####  Pane & Window Management
##### ======================================================

# Split panes while inheriting the current working directory
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Resize panes (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Create a new window in the current directory
bind c new-window -c '#{pane_current_path}'

# Switch windows without prefix
bind -n S-left  previous-window
bind -n S-right next-window


##### ======================================================
#####  Copy Mode (vi-style)
##### ======================================================

# Use vi key bindings in copy mode
set -g mode-keys vi

# Yank selection to system clipboard (macOS: pbcopy)
bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"


##### ======================================================
#####  General Options
##### ======================================================

# Start window and pane numbering from 1
set -g base-index 1

# Use 256-color terminal
set -g default-terminal "xterm-256color"

# Fix cursor shape handling using extended terminfo (ncurses)
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Duration (ms) to display pane numbers
set -g display-panes-time 3000


##### ======================================================
#####  Status Bar: Base (Nord-inspired)
##### ======================================================

# Place status bar at the top
set-option -g status-position top

# Refresh status bar every second
set-option -g status-interval 1

# Center window list
set-option -g status-justify centre

# Base colors (Nord dark-like)
set-option -g status-bg colour236
set-option -g status-fg colour250


##### ======================================================
#####  Accent Colors (Per-Machine Customization)
##### ======================================================

# Default / main machine accent (blue)
set -g @accent    colour81
set -g @accent_bg colour24

# Example alternatives for other machines
# set -g @accent    colour114   # green
# set -g @accent_bg colour29

# set -g @accent    colour220   # yellow
# set -g @accent_bg colour136


##### ======================================================
#####  Status Bar: Left / Right
##### ======================================================

# Left status: pane index + window title
set-option -g status-left '#[fg=#{@accent}][#P] #[fg=colour250]#T'

# Increase maximum length of right status
set-option -g status-right-length 80

# Right status: hostname | date | time
set-option -g status-right \
"#[fg=colour109] #H #[fg=colour240]│ #[fg=colour245]%Y-%m-%d #[fg=white]%H:%M "

# set-option -g status-right \
# "#[fg=colour109] #H #[fg=colour240]│ #[fg=colour245]%Y-%m-%d #[fg=white]%H:%M:%S "


##### ======================================================
#####  Window List Styling
##### ======================================================

# Inactive window format
setw -g window-status-format '#[fg=colour245] #I #W '

# Active window format
# If prefix is pressed, background changes to indicate it
setw -g window-status-current-format \
'#[bg=#{@accent_bg},fg=colour231]#{?client_prefix,#[bg=colour88],} #I #W '


##### ======================================================
#####  Pane Visibility & Borders
##### ======================================================

# Keep background default, slightly dim inactive pane text
set -g window-active-style 'fg=colour255,bg=default'
set -g window-style        'fg=colour244,bg=default'

# Pane border styling
# set -g pane-border-style        'fg=colour238'
# set -g pane-active-border-style 'fg=#{@accent},bg=#{@accent_bg}'
set -g pane-border-style 'fg=colour235'
set -g pane-active-border-style 'fg=#{@accent}'



##### ======================================================
#####  Copy Mode Appearance
##### ======================================================

# Copy mode colors:
# Light blue background with dark text for visibility
set -g mode-style 'bg=colour75,fg=colour235'

